<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScreenClips Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f0f0f0;
      width: 320px;
      height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      overflow: hidden;
    }
    .logo { font-size: 13px; color: #666; font-weight: 600; letter-spacing: 0.03em; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #e53e3e; flex-shrink: 0; }
    .dot.pulse { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    .timer { font-variant-numeric: tabular-nums; margin-left: 8px; }
    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-start  { background: #e53e3e; color: #fff; }
    .btn-stop   { background: #c53030; color: #fff; }
    .progress-bar { width: 100%; background: #222; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: #e53e3e; border-radius: 4px; width: 0%; transition: width 0.3s; }
    .msg { font-size: 13px; color: #bbb; }
    .msg.success { color: #68d391; font-weight: 700; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="logo">⏺ ScreenClips</div>

  <!-- Ready -->
  <div id="s-ready">
    <button id="btn-start" class="btn btn-start">Start Recording</button>
  </div>

  <!-- Recording -->
  <div id="s-recording" class="hidden">
    <div class="status">
      <span class="dot pulse"></span>
      <span>Recording</span>
      <span id="timer" class="timer">0:00</span>
    </div>
    <button id="btn-stop" class="btn btn-stop" style="margin-top:8px">&#9632;&nbsp; Stop &amp; Save</button>
  </div>

  <!-- Uploading -->
  <div id="s-uploading" class="hidden">
    <div class="msg">Uploading to library…</div>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
  </div>

  <!-- Done -->
  <div id="s-done" class="hidden">
    <div class="msg success">&#10003; Saved to your library!</div>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
