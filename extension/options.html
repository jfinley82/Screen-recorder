<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Screen Recorder — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #f0f0f0; padding: 32px; max-width: 520px; }
    h1 { font-size: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    h2 { font-size: 14px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; margin-top: 28px; }
    .card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 10px; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .row-label { font-size: 14px; }
    .row-sub { font-size: 12px; color: #777; margin-top: 2px; }
    /* Toggle */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #333; border-radius: 24px; cursor: pointer; transition: background 0.2s; }
    .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    input:checked + .slider { background: #e53e3e; }
    input:checked + .slider:before { transform: translateX(20px); }
    /* Input */
    input[type="text"] { background: #141414; border: 1px solid #333; border-radius: 6px; padding: 8px 10px; color: #f0f0f0; font-size: 13px; width: 100%; outline: none; }
    input[type="text"]:focus { border-color: #555; }
    .btn { padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #e53e3e; color: #fff; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .saved { color: #68d391; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <h1>&#9210; Screen Recorder <span style="color:#666;font-weight:400;font-size:14px">Options</span></h1>

  <h2>Storage</h2>
  <div class="card">
    <div class="row">
      <div>
        <div class="row-label">Save to cloud (Mux)</div>
        <div class="row-sub">Videos are uploaded to your library via Mux</div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-cloud" checked /><span class="slider"></span></label>
    </div>
    <div id="local-options">
      <div class="row">
        <div>
          <div class="row-label">Also save locally</div>
          <div class="row-sub">Download a copy to your computer after recording</div>
        </div>
        <label class="toggle"><input type="checkbox" id="toggle-local" /><span class="slider"></span></label>
      </div>
    </div>
  </div>

  <h2>Server</h2>
  <div class="card">
    <div>
      <div class="row-label">App URL</div>
      <div class="row-sub" style="margin-bottom:8px">Change if you're self-hosting</div>
      <input type="text" id="input-url" placeholder="https://your-app.railway.app" />
    </div>
  </div>

  <br />
  <div style="display:flex;align-items:center;gap:12px">
    <button class="btn" id="btn-save">Save Settings</button>
    <span class="saved" id="saved-msg">&#10003; Saved</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
